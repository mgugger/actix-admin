name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install toolchain
      run: rustup toolchain install stable --component rustfmt clippy
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Clippy
      run: cargo clippy --all-targets --no-default-features --features bulma_css -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install cargo-audit
      run: cargo install --locked cargo-audit || true
    - name: Audit
      run: cargo audit || true

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: browser-actions/setup-geckodriver@latest
    - uses: browser-actions/setup-firefox@latest
    - name: Build
      run: cargo build --verbose
    - name: Run tests with bulma_css feature
      run: cargo test --verbose --features bulma_css --no-default-features
    - name: Run tests with bootstrapv5_css feature
      run: cargo test --verbose --features bootstrapv5_css --no-default-features
